<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lane-Switch Survivor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hud">
        <div>
          <span class="label">Time</span>
          <strong id="time">0.0s</strong>
        </div>
        <div>
          <span class="label">Best</span>
          <strong id="best">0.0s</strong>
        </div>
      </header>
      <canvas id="game" width="360" height="640" aria-label="Lane-Switch Survivor"></canvas>
      <section class="controls">
        <button id="leftBtn" type="button">← Lane</button>
        <button id="restartBtn" type="button">Restart</button>
        <button id="rightBtn" type="button">Lane →</button>
      </section>
      <p class="hint">Swipe or tap left/right side of the playfield to switch lanes.</p>
    </main>
    <script src="game.js"></script>
  </body>
</html>
