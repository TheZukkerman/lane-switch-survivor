<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#090b14" />
    <title>Lane-Switch Survivor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hud">
        <div>
          <span class="label">Time</span>
          <strong id="time">0.0s</strong>
        </div>
        <div>
          <span class="label">Progress</span>
          <strong id="score">0/0</strong>
        </div>
        <div>
          <span class="label">State</span>
          <strong id="corrupt">TAP TO START</strong>
        </div>
        <div>
          <span class="label">Best</span>
          <strong id="best">0.0s • 0</strong>
        </div>
        <div>
          <span class="label">Run</span>
          <strong id="pace">0%</strong>
        </div>
      </header>
      <canvas id="game" width="360" height="640" aria-label="Lane-Switch Survivor" role="img"></canvas>
      <section class="controls">
        <button id="leftBtn" type="button">← Lane</button>
        <button id="restartBtn" type="button">Restart</button>
        <button id="rightBtn" type="button">Lane →</button>
      </section>
      <p class="hint">Fixed Level 1. Same sequence every try. Swipe or tap to switch lanes, survive to the end, then instantly run it back.</p>
    </main>
    <script src="game.js"></script>
  </body>
</html>
